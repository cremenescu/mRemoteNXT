name: mRemoteNXT
options:
  bundleIdPrefix: ro.cremenescu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  MRNG:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  mRemoteNXT:
    type: application
    platform: macOS
    sources:
      - App
      - path: mRemoteNXT.icon
    dependencies:
      - package: MRNG
        product: MRNGCore
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sparkle
        product: Sparkle
    info:
      path: App/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, ro, pl]
        # Version + build come from MARKETING_VERSION / CURRENT_PROJECT_VERSION
        # in `settings.base` below — single source of truth, bump there only.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 Razvan Cremenescu. Released under GPL-2.0-or-later."
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.utilities
        # macOS 15+/Tahoe gate connections to LAN hosts behind the Local Network
        # privacy permission; without this key the TCC prompt never appears and
        # RDP/SSH to local servers fails at the TCP transport
        # (ERRCONNECT_CONNECT_TRANSPORT_FAILED).
        NSLocalNetworkUsageDescription: "mRemoteNXT connects to servers on your local network for RDP, SSH, Telnet, SFTP and HTTP sessions."
        # Sparkle auto-update. Feed (appcast) is hosted on cremenescu.ro; the DMG
        # enclosures point at GitHub Releases. SUPublicEDKey is the EdDSA public
        # key (private key lives only in the build machine's login keychain).
        # Automatic background checks are enabled (daily); updates are downloaded
        # and installed only after prompting the user (SUAutomaticallyUpdate=false).
        SUFeedURL: "https://cremenescu.ro/assets/mremotenxt-appcast.xml"
        SUPublicEDKey: "H3Hm6zo4EVt4Dva4QV1/+HLK1c9ajCvl/pApbxsTAvU="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ro.cremenescu.mRemoteNXT
        PRODUCT_NAME: mRemoteNXT
        ASSETCATALOG_COMPILER_APPICON_NAME: mRemoteNXT
        MARKETING_VERSION: "0.7.0"
        CURRENT_PROJECT_VERSION: "12"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: App/Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS:
          - /opt/homebrew/opt/freerdp/include/freerdp3
          - /opt/homebrew/opt/freerdp/include/winpr3
          - /opt/homebrew/opt/openssl@3/include
        LIBRARY_SEARCH_PATHS:
          - /opt/homebrew/opt/freerdp/lib
          - /opt/homebrew/opt/openssl@3/lib
        OTHER_LDFLAGS:
          - -lfreerdp-client3
          - -lfreerdp3
          - -lwinpr3
          # OSSL_PROVIDER_* (legacy provider load for NTLM/MD4) is called
          # directly from RDPCore.c, so link libcrypto explicitly rather than
          # relying on the transitive dep through FreeRDP.
          - -lcrypto
